<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roofing Profit Calculator</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root { --bg: #1a1a2e; --card: #16213e; --accent: #e94560; --text: #eee; --muted: #889; --green: #2ecc71; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Segoe UI,system-ui,sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
  .container { max-width: 1000px; margin: 0 auto; }
  h1 { text-align: center; margin: 20px 0; font-size: 1.8rem; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width:768px){ .grid { grid-template-columns:1fr; } }
  .card { background: var(--card); border-radius: 12px; padding: 20px; }
  .card h2 { font-size: 1.1rem; margin-bottom: 16px; color: var(--accent); }
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 4px; }
  .form-group input { width: 100%; padding: 8px 12px; border-radius: 6px; border:1px solid #333; background:#0f3460; color:#fff; font-size:0.95rem; }
  .form-group input:focus { outline:2px solid var(--accent); }
  .form-group input[type="range"] { padding:0; background:0; }
  input[type="range"] { -webkit-appearance:none; appearance:none; width:100%; height:6px; border-radius:3px; background:#0f3460; outline:none; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; appearance:none; width:18px; height:18px; border-radius:50%; background:var(--accent); cursor:pointer; }
  .range-value { text-align:right; font-size:0.9rem; margin-top:2px; }
  .profit-badge { display:inline-block; padding:4px 12px; border-radius:20px; font-weight:600; font-size:0.85rem; }
  .badge-green { background:#1a3a2a; color:#2ecc71; }
  .badge-yellow { background:#3a3a1a; color:#f1c40f; }
  .badge-red { background:#3a1a1a; color:#e74c3c; }
  .stat-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #1a1a3a; }
  .stat-row:last-child { border-bottom:0; }
  .stat-label { color:var(--muted); }
  .stat-value { font-weight:600; }
  .stat-value.green { color:var(--green); }
  .stat-value.red { color:var(--accent); }
  .btn { padding:10px 24px; border-radius:8px; border:0; cursor:pointer; font-weight:600; transition:.3s; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:#c0392b; }
  .btn-secondary { background:#0f3460; color:var(--text); }
  .btn-secondary:hover { background:#1a4a7a; }
  .actions { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }
  table { width:100%; border-collapse:collapse; font-size:0.85rem; }
  th, td { padding:8px 10px; text-align:right; border-bottom:1px solid #1a1a3a; }
  th { color:var(--accent); font-weight:600; }
  td:first-child, th:first-child { text-align:left; }
  tr:hover { background:#1a1a3a; }
  canvas { max-height: 300px; }
</style>
</head>
<body>
<div class="container">
  <h1>🛠️ Roofing Profit Calculator</h1>
  <div class="grid">
    <div class="card">
      <h2>📋 Inputs</h2>
      <div class="form-group">
        <label>Job Price (per square)</label>
        <input type="number" id="jobPrice" value="600" step="10" min="100">
      </div>
      <div class="form-group">
        <label>Material Cost (per square)</label>
        <input type="number" id="materialCost" value="200" step="5" min="0">
      </div>
      <div class="form-group">
        <label>Labor Cost (per square)</label>
        <input type="number" id="laborCost" value="150" step="5" min="0">
      </div>
      <div class="form-group">
        <label>Overhead (%%)</label>
        <input type="range" id="overhead" min="5" max="40" value="15">
<div class="range-value" id="overheadVal">15%%</div>
      </div>
      <div class="form-group">
        <label>Number of Squares</label>
        <input type="range" id="squares" min="5" max="100" value="30">
        <div class="range-value" id="squaresVal">30</div>
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="calculate()">Calculate</button>
        <button class="btn btn-secondary" onclick="resetForm()">Reset</button>
      </div>
    </div>
    <div class="card">
      <h2>📊 Results</h2>
      <div id="results">
        <div class="stat-row"><span class="stat-label">Revenue</span><span class="stat-value" id="revVal">$18,000</span></div>
        <div class="stat-row"><span class="stat-label">Total Cost</span><span class="stat-value" id="costVal">$13,950</span></div>
        <div class="stat-row"><span class="stat-label">Gross Profit</span><span class="stat-value green" id="profitVal">$4,050</span></div>
        <div class="stat-row"><span class="stat-label">Profit Margin</span><span class="stat-value" id="marginVal">22.5%%</span></div>
        <div class="stat-row"><span class="stat-label">Profit per Square</span><span class="stat-value" id="ppsVal">$135</span></div>
        <div class="stat-row"><span class="stat-label">Breakeven Volume</span><span class="stat-value" id="beVal">12 sq</span></div>
      </div>
      <div style="margin-top:14px" id="profitBadge"></div>
    </div>
  </div>
  <div class="card" style="margin-top:20px">
    <h2>📈 Profit Analysis</h2>
    <canvas id="profitChart"></canvas>
  </div>
  <div class="card" style="margin-top:20px">
    <h2>📅 Annual Projection</h2>
    <div style="overflow-x:auto"><table id="annualTable"></table></div>
  </div>
  <div class="actions" style="justify-content:center">
    <button class="btn btn-secondary" onclick="downloadReport()">📥 Download Report</button>
  </div>
</div>
<script>
let chart = null;
function $(id){return document.getElementById(id);}
function calculate(){
  const jp = parseFloat($('jobPrice').value) || 0;
  const mc = parseFloat($('materialCost').value) || 0;
  const lc = parseFloat($('laborCost').value) || 0;
  const oh = parseFloat($('overhead').value) / 100;
  const sq = parseInt($('squares').value) || 0;
  const laborRate = lc;
  const overheadRate = oh;
  const revenue = jp * sq;
  const totalCost = (mc + laborRate) * sq * (1 + overheadRate);
  const grossProfit = revenue - totalCost;
  const margin = revenue > 0 ? (grossProfit / revenue) * 100 : 0;
  const pps = sq > 0 ? grossProfit / sq : 0;
  const varCostPerSq = (mc + laborRate) * (1 + overheadRate);
  const beVol = varCostPerSq > 0 ? jp / varCostPerSq : 1;
  const fixedCost = 0;
  $('revVal').textContent = '$' + revenue.toLocaleString();
  $('costVal').textContent = '$' + totalCost.toLocaleString();
  const profitEl = $('profitVal');
  profitEl.textContent = '$' + grossProfit.toLocaleString();
  profitEl.className = 'stat-value ' + (grossProfit >= 0 ? 'green' : 'red');
  $('marginVal').textContent = margin.toFixed(1) + '%';
  $('ppsVal').textContent = '$' + pps.toFixed(0);
  $('beVal').textContent = Math.ceil(beVol) + ' sq';
  const badge = $('profitBadge');
  if(margin >= 25) badge.innerHTML = '<span class="profit-badge badge-green">✅ Excellent — high margin</span>';
  else if(margin >= 15) badge.innerHTML = '<span class="profit-badge badge-yellow">⚠️ Decent — room to improve</span>';
  else badge.innerHTML = '<span class="profit-badge badge-red">❌ Low margin — review pricing</span>';
  updateChart(jp, varCostPerSq, sq);
  updateTable(jp, varCostPerSq, sq);
}
function updateChart(jp, vc, sq){
  const labels = Array.from({length: sq+1}, (_,i) => i);
  const rev = labels.map(s => s * jp);
  const cost = labels.map(s => s * vc);
  const profit = labels.map(s => s * jp - s * vc);
  const ctx = $('profitChart').getContext('2d');
  if(chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
{ label: 'Revenue', data: rev, borderColor: '#3498db', tension:0.3, fill:false },
        { label: 'Cost', data: cost, borderColor: '#e74c3c', tension:0.3, fill:false },
        { label: 'Profit', data: profit, borderColor: '#2ecc71', tension:0.3, fill:false }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: { legend: { labels: { color:'#eee' } } },
      scales: {
        x: { ticks: { color:'#889' }, grid: { color:'#1a1a3a' } },
        y: { ticks: { color:'#889', callback: v=>'$'+v.toLocaleString() }, grid: { color:'#1a1a3a' } }
      }
    }
  });
}
function updateTable(jp, vc, sq){
  const tbody = $('annualTable');
  let html = '<thead><tr><th>Month</th><th>Sq Installed</th><th>Revenue</th><th>Cost</th><th>Profit</th><th>Margin</th></tr></thead><tbody>';
  for(let m=1; m<=12; m++){
    const s = sq * m;
    const r = s * jp;
    const c = s * vc;
    const p = r - c;
    const mg = r > 0 ? (p/r)*100 : 0;
    html += `<tr><td>Month ${m}</td><td>${s}</td><td>$${r.toLocaleString()}</td><td>$${c.toLocaleString()}</td><td style="color:${p>=0?'#2ecc71':'#e74c3c'}">$${p.toLocaleString()}</td><td>${mg.toFixed(1)}%</td></tr>`;
  }
  html += '</tbody>';
  tbody.innerHTML = html;
}
function downloadReport(){
  const jp = parseFloat($('jobPrice').value) || 0;
  const mc = parseFloat($('materialCost').value) || 0;
  const lc = parseFloat($('laborCost').value) || 0;
  const oh = parseFloat($('overhead').value) / 100;
  const sq = parseInt($('squares').value) || 0;
  const revenue = jp * sq;
  const totalCost = (mc + lc) * sq * (1 + oh);
  const profit = revenue - totalCost;
  const margin = revenue > 0 ? ((profit / revenue) * 100).toFixed(1) : '0.0';
  const line = '─'.repeat(50);
  let txt = `${line}\n  ROOFING PROFIT CALCULATOR — REPORT\n${line}\n\n`;
  txt += `Job Price:        $${jp}/sq\nMaterial Cost:    $${mc}/sq\nLabor Cost:       $${lc}/sq\nOverhead:         ${oh*100}%\nSquares:          ${sq}\n\n${line}\n`;
  txt += `Revenue:          $${revenue.toLocaleString()}\nTotal Cost:       $${totalCost.toLocaleString()}\nGross Profit:     $${profit.toLocaleString()}\nProfit Margin:    ${margin}%\nProfit/Sq:        $${(profit/sq).toFixed(0)}\n${line}\n\nGenerated: ${new Date().toLocaleString()}`;
  const blob = new Blob([txt], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'roofing-profit-report.txt';
  a.click();
}
function resetForm(){
  $('jobPrice').value = 600;
  $('materialCost').value = 200;
  $('laborCost').value = 150;
  $('overhead').value = 15;
  $('squares').value = 30;
  $('overheadVal').textContent = '15%';
  $('squaresVal').textContent = '30';
  calculate();
}
document.querySelectorAll('input[type="range"]').forEach(el => {
  el.addEventListener('input', function(){
    const lbl = this.id + 'Val';
    if(document.getElementById(lbl)) document.getElementById(lbl).textContent = this.id==='overhead' ? this.value+'%' : this.value;
    calculate();
  });
});
document.querySelectorAll('input[type="number"]').forEach(el => el.addEventListener('input', calculate));
calculate();
</script>
</body>
</html>
